name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
          path: |
            ${{ env.STORE_PATH }}

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
          path: |
            ${{ env.STORE_PATH }}

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm type-check

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mysql:
        image: mysql@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
        env:
          MYSQL_ROOT_PASSWORD: ci_root
          MYSQL_DATABASE: nexus_form_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pci_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: mysql://root:ci_root@127.0.0.1:3306/nexus_form_ci
      REDIS_URL: redis://127.0.0.1:6379
      AUTH_SECRET: ci-test-auth-secret-must-be-at-least-32-characters
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
          path: |
            ${{ env.STORE_PATH }}

      - name: Install dependencies
        run: pnpm install

      - name: Apply database migrations
        run: |
          set -euo pipefail
          mysql -h 127.0.0.1 -P 3306 -uroot -pci_root -e "SET GLOBAL foreign_key_checks=0;"
          trap 'mysql -h 127.0.0.1 -P 3306 -uroot -pci_root -e "SET GLOBAL foreign_key_checks=1;"' EXIT
          pnpm --filter @nexus-form/database exec drizzle-kit migrate

      - name: Run tests
        run: pnpm test

  e2e-harness:
    name: E2E Harness
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    services:
      mysql:
        image: mysql@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
        env:
          MYSQL_ROOT_PASSWORD: ci_root
          MYSQL_DATABASE: nexus_form_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pci_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: mysql://root:ci_root@127.0.0.1:3306/nexus_form_ci
      REDIS_URL: redis://127.0.0.1:6379
      AUTH_SECRET: ci-test-auth-secret-must-be-at-least-32-characters
      BETTER_AUTH_SECRET: ci-test-auth-secret-must-be-at-least-32-characters
      TRUSTED_ORIGINS: http://127.0.0.1:3000
      GOOGLE_OAUTH_ENC_KEY: ci-google-oauth-encryption-key
      SERVICE_MONITORING_INTERVAL: "0"
      VALIDATION_PLUGINS_DIR: e2e/fixtures/validation-plugins
      WORKER_QUEUES: e2e_validation-validation
      WORKER_HEALTH_FILE: /tmp/nexus-form-worker-health.json
      WORKER_HEALTH_MAX_AGE_MS: "5000"
      WORKER_HEALTH_PULSE_INTERVAL_MS: "1000"
      WORKER_SHUTDOWN_TIMEOUT_MS: "10000"
      BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_SKIP_WEB_SERVER: "1"
      VITE_API_URL: http://127.0.0.1:3001
      VITE_BASE_URL: http://127.0.0.1:3000
      VITE_HCAPTCHA_SITE_KEY: ci-hcaptcha-site-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
          path: |
            ${{ env.STORE_PATH }}

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply database migrations
        run: |
          set -euo pipefail
          mysql -h 127.0.0.1 -P 3306 -uroot -pci_root -e "SET GLOBAL foreign_key_checks=0;"
          trap 'mysql -h 127.0.0.1 -P 3306 -uroot -pci_root -e "SET GLOBAL foreign_key_checks=1;"' EXIT
          pnpm --filter @nexus-form/database exec drizzle-kit migrate

      - name: Build E2E server artifacts
        run: pnpm build

      - name: Start API server
        env:
          FORM_SECURITY_DEV_BYPASS: "true"
          NODE_ENV: development
        run: |
          set -euo pipefail
          rm -f /tmp/nexus-form-api.log /tmp/nexus-form-api.pid
          node apps/api/dist/index.mjs > /tmp/nexus-form-api.log 2>&1 &
          echo "$!" > /tmp/nexus-form-api.pid

      - name: Wait for API server
        run: |
          set -euo pipefail
          api_pid="$(cat /tmp/nexus-form-api.pid)"
          for _ in {1..60}; do
            if ! kill -0 "$api_pid" 2>/dev/null; then
              exit 1
            fi
            if curl --connect-timeout 1 --max-time 2 -fsS http://127.0.0.1:3001/api/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Start validation worker
        run: |
          set -euo pipefail
          rm -f /tmp/nexus-form-worker.log /tmp/nexus-form-worker.pid "$WORKER_HEALTH_FILE"
          node apps/worker/dist/index.mjs > /tmp/nexus-form-worker.log 2>&1 &
          echo "$!" > /tmp/nexus-form-worker.pid

      - name: Wait for validation worker
        run: |
          set -euo pipefail
          worker_pid="$(cat /tmp/nexus-form-worker.pid)"
          for _ in {1..60}; do
            if ! kill -0 "$worker_pid" 2>/dev/null; then
              exit 1
            fi
            if node scripts/worker-health-probe.mjs readiness; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Start web server
        run: |
          set -euo pipefail
          rm -f /tmp/nexus-form-web.log /tmp/nexus-form-web.pid
          cd apps/web
          node_modules/.bin/vite preview --host 127.0.0.1 --port 3000 > /tmp/nexus-form-web.log 2>&1 &
          echo "$!" > /tmp/nexus-form-web.pid

      - name: Wait for web server
        run: |
          set -euo pipefail
          web_pid="$(cat /tmp/nexus-form-web.pid)"
          for _ in {1..60}; do
            if ! kill -0 "$web_pid" 2>/dev/null; then
              exit 1
            fi
            if curl --connect-timeout 1 --max-time 2 -fsS http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Validate E2E service endpoints
        run: |
          set -euo pipefail
          curl --connect-timeout 1 --max-time 2 -fsS http://127.0.0.1:3001/api/healthz
          curl --connect-timeout 1 --max-time 2 -fsS "$BASE_URL/" > /dev/null
          node scripts/worker-health-probe.mjs readiness

      - name: List Playwright E2E tests selected by CI
        run: pnpm test:e2e:ci -- --list

      - name: Run Playwright E2E tests
        run: pnpm test:e2e:ci

      - name: Print E2E service logs
        if: failure()
        run: |
          for service in api web worker; do
            log_file="/tmp/nexus-form-${service}.log"
            echo "::group::${service} service log (last 64 KiB)"
            if [ -f "$log_file" ]; then
              tail -c 65536 "$log_file"
            else
              echo "Log file was not created."
            fi
            echo "::endgroup::"
          done

      - name: Stop E2E services
        if: always()
        run: |
          set -u
          pid_files=(
            /tmp/nexus-form-web.pid
            /tmp/nexus-form-worker.pid
            /tmp/nexus-form-api.pid
          )
          pids=()

          for pid_file in "${pid_files[@]}"; do
            if [ ! -f "$pid_file" ]; then
              continue
            fi
            pid="$(cat "$pid_file")"
            if [[ "$pid" =~ ^[0-9]+$ ]] && kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
              pids+=("$pid")
            fi
          done

          for _ in {1..10}; do
            running=0
            for pid in "${pids[@]}"; do
              if kill -0 "$pid" 2>/dev/null; then
                running=1
              fi
            done
            if [ "$running" -eq 0 ]; then
              break
            fi
            sleep 1
          done

          for pid in "${pids[@]}"; do
            if kill -0 "$pid" 2>/dev/null; then
              kill -KILL "$pid" 2>/dev/null || true
            fi
          done

          rm -f "${pid_files[@]}" "$WORKER_HEALTH_FILE"

  build:
    name: Build (production)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
          path: |
            ${{ env.STORE_PATH }}

      - name: Install dependencies
        run: pnpm install

      - name: Run production build
        run: pnpm build
        env:
          VITE_API_URL: http://127.0.0.1:3001
          VITE_HCAPTCHA_SITE_KEY: ci-hcaptcha-site-key
