name: Docker Build and Push

# Docker イメージのビルドとプッシュ
# Hono APIサーバー用イメージ（Dockerfile）、Web SPA用イメージ（Dockerfile.web）、
# BullMQワーカー用イメージ（Dockerfile.worker）を並列ビルド

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nexus-form
  NODE_VERSION: "24"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-common:
    name: Build validation-provider packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependency packages
        run: |
          pnpm --filter @nexus-form/shared build && \
          pnpm --filter @nexus-form/database build && \
          pnpm --filter @nexus-form/integrations build && \
          pnpm --filter "@nexus-form/validation-provider-*" build

      - name: Stage pre-built dists
        run: |
          mkdir -p ci-prebuilt/packages
          for pkg in packages/validation-provider-*; do
            [ -d "$pkg/dist" ] || continue
            name=$(basename "$pkg")
            cp -r "$pkg/dist" "ci-prebuilt/packages/$name/"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: validators-dist
          path: ci-prebuilt/
          retention-days: 1

  build-api:
    name: Build and Push API Image
    needs: [build-common]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pre-built validators
        uses: actions/download-artifact@v4
        with:
          name: validators-dist
          path: ci-prebuilt/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set owner and image metadata
        id: meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_TYPE: ${{ github.ref_type }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          echo "OWNER=$OWNER" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT

          sanitize_tag() {
            local clean
            clean=$(printf '%s\n' "$1" | sed -E -e 's/[^a-zA-Z0-9_.-]/-/g' -e 's/^[.-]+//' -e 's/[.-]+$//')
            if [ ${#clean} -gt 128 ]; then
              clean="${clean:0:128}"
              clean=$(printf '%s\n' "$clean" | sed -E 's/[.-]+$//')
            fi
            printf '%s\n' "$clean"
          }

          if [ "$REF_TYPE" = "tag" ] || [[ "$REF" == refs/tags/* ]]; then
            RAW_TAG="${REF_NAME#refs/tags/}"
            CLEAN_TAG=$(sanitize_tag "$RAW_TAG")
            RAW_SEMVER="${RAW_TAG#v}"
            CLEAN_SEMVER=$(sanitize_tag "$RAW_SEMVER")

            TAGS="ghcr.io/$OWNER/$IMAGE_NAME:latest"
            if [ -n "$CLEAN_TAG" ]; then
              TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME:$CLEAN_TAG"
            fi
            if [ -n "$CLEAN_SEMVER" ] && [ "$CLEAN_SEMVER" != "$CLEAN_TAG" ]; then
              TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME:$CLEAN_SEMVER"
            fi
            TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME:sha-$SHORT_SHA"
          else
            TAGS="ghcr.io/$OWNER/$IMAGE_NAME:latest-dev,ghcr.io/$OWNER/$IMAGE_NAME:sha-$SHORT_SHA"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.OWNER }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: Build and Push Web Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set owner and image metadata
        id: meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_TYPE: ${{ github.ref_type }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          echo "OWNER=$OWNER" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT

          sanitize_tag() {
            local clean
            clean=$(printf '%s\n' "$1" | sed -E -e 's/[^a-zA-Z0-9_.-]/-/g' -e 's/^[.-]+//' -e 's/[.-]+$//')
            if [ ${#clean} -gt 128 ]; then
              clean="${clean:0:128}"
              clean=$(printf '%s\n' "$clean" | sed -E 's/[.-]+$//')
            fi
            printf '%s\n' "$clean"
          }

          if [ "$REF_TYPE" = "tag" ] || [[ "$REF" == refs/tags/* ]]; then
            RAW_TAG="${REF_NAME#refs/tags/}"
            CLEAN_TAG=$(sanitize_tag "$RAW_TAG")
            RAW_SEMVER="${RAW_TAG#v}"
            CLEAN_SEMVER=$(sanitize_tag "$RAW_SEMVER")

            TAGS="ghcr.io/$OWNER/$IMAGE_NAME-web:latest"
            if [ -n "$CLEAN_TAG" ]; then
              TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME-web:$CLEAN_TAG"
            fi
            if [ -n "$CLEAN_SEMVER" ] && [ "$CLEAN_SEMVER" != "$CLEAN_TAG" ]; then
              TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME-web:$CLEAN_SEMVER"
            fi
            TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME-web:sha-$SHORT_SHA"
          else
            TAGS="ghcr.io/$OWNER/$IMAGE_NAME-web:latest-dev,ghcr.io/$OWNER/$IMAGE_NAME-web:sha-$SHORT_SHA"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.OWNER }}
          password: ${{ github.token }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-worker:
    name: Build and Push Worker Image
    needs: [build-common]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pre-built validators
        uses: actions/download-artifact@v4
        with:
          name: validators-dist
          path: ci-prebuilt/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set owner and image metadata
        id: meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_TYPE: ${{ github.ref_type }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          echo "OWNER=$OWNER" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT

          sanitize_tag() {
            local clean
            clean=$(printf '%s\n' "$1" | sed -E -e 's/[^a-zA-Z0-9_.-]/-/g' -e 's/^[.-]+//' -e 's/[.-]+$//')
            if [ ${#clean} -gt 128 ]; then
              clean="${clean:0:128}"
              clean=$(printf '%s\n' "$clean" | sed -E 's/[.-]+$//')
            fi
            printf '%s\n' "$clean"
          }

          if [ "$REF_TYPE" = "tag" ] || [[ "$REF" == refs/tags/* ]]; then
            RAW_TAG="${REF_NAME#refs/tags/}"
            CLEAN_TAG=$(sanitize_tag "$RAW_TAG")
            RAW_SEMVER="${RAW_TAG#v}"
            CLEAN_SEMVER=$(sanitize_tag "$RAW_SEMVER")

            TAGS="ghcr.io/$OWNER/$IMAGE_NAME-worker:latest"
            if [ -n "$CLEAN_TAG" ]; then
              TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME-worker:$CLEAN_TAG"
            fi
            if [ -n "$CLEAN_SEMVER" ] && [ "$CLEAN_SEMVER" != "$CLEAN_TAG" ]; then
              TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME-worker:$CLEAN_SEMVER"
            fi
            TAGS="$TAGS,ghcr.io/$OWNER/$IMAGE_NAME-worker:sha-$SHORT_SHA"
          else
            TAGS="ghcr.io/$OWNER/$IMAGE_NAME-worker:latest-dev,ghcr.io/$OWNER/$IMAGE_NAME-worker:sha-$SHORT_SHA"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.OWNER }}
          password: ${{ github.token }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
