apiVersion: apps/v1
kind: Deployment
metadata:
  name: bullmq-sheets
  labels:
    app: nexus-form
    component: bullmq-sheets
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: nexus-form
      component: bullmq-sheets
  template:
    metadata:
      labels:
        app: nexus-form
        component: bullmq-sheets
    spec:
      containers:
      - name: sheets-worker
        # Use worker-specific image built from Dockerfile.worker.
        # src/index.ts selects this queue via WORKER_QUEUES.
        image: nexus-form-worker:latest
        imagePullPolicy: Always
        command: ["pnpm"]
        args: ["--filter", "@nexus-form/worker", "exec", "tsx", "src/index.ts"]
        env:
        - name: WORKER_QUEUES
          value: "google-sheets-sync"
        envFrom:
        - configMapRef:
            name: nexus-form-config
        - secretRef:
            name: nexus-form-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # BullMQ workers typically don't expose HTTP endpoints
        # Health checks can be added via file-based health checks or custom endpoints if needed
