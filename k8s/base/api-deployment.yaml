apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: nexus-form
    component: api
spec:
  replicas: 1
  # Phase 2 creates a second bridge ReplicaSet with the rotated AUTH_SECRET.
  # Keep only that previous fixed ReplicaSet as the native rollback target.
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nexus-form
      component: api
  template:
    metadata:
      annotations:
        # Non-secret rollout marker. Change this together with AUTH_SECRET so
        # envFrom consumers are recreated; never put secret material here.
        nexus-form.xpadev.net/auth-secret-revision: "CHANGE_ME_WITH_AUTH_SECRET_REVISION"
      labels:
        app: nexus-form
        component: api
    spec:
      containers:
      - name: api
        image: nexus-form:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: nexus-form-config
        - secretRef:
            name: nexus-form-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/health   # basic process-alive check
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/healthz  # checks DB + dependencies
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
