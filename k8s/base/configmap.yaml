apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-form-config
  labels:
    app: nexus-form
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  # Redis
  REDIS_URL: "redis://redis-service:6379"
  
  # Application
  NODE_ENV: "production"
  
  # External Services (optional)
  # Note: S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY are stored in Secret
  S3_ENDPOINT: ""
  S3_BUCKET_TMP: "tmp"
  S3_BUCKET_PROD: "prod"
  
  # Web runtime configuration (injected into /env-config.js by Docker entrypoint)
  # Must be reachable from the end user's browser, not a cluster-internal Service DNS name.
  VITE_API_URL: "https://api.example.com"
  VITE_BASE_URL: ""
  VITE_HCAPTCHA_SITE_KEY: ""
  VITE_TELEMETRY_HOST: ""
  VITE_TELEMETRY_V4_HOST: ""
  VITE_TELEMETRY_V6_HOST: ""

  # Brand customization (optional, defaults to nexus-form branding)
  VITE_BRAND_APP_NAME: ""
  VITE_BRAND_PRIMARY_COLOR: ""
  VITE_BRAND_SECONDARY_COLOR: ""
  VITE_BRAND_ACCENT_COLOR: ""
  VITE_BRAND_TERMS_URL: ""
  VITE_BRAND_PRIVACY_URL: ""
  VITE_BRAND_COPYRIGHT: ""
  VITE_BRAND_HOMEPAGE_URL: ""

  # Public API origin used by server-side Google OAuth callback pages
  API_BASE_URL: ""
  
  # Optional Settings
  SENTRY_DSN: ""
  LOG_LEVEL: "info"
