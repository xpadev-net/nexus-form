apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-form-config
  labels:
    app: nexus-form
data:
  # Redis
  REDIS_URL: "redis://redis-service:6379"
  
  # NextAuth.js
  NEXTAUTH_URL: "http://localhost:3000"
  
  # Application
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  
  # External Services (optional)
  # Note: S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY are stored in Secret
  S3_ENDPOINT: ""
  S3_BUCKET_TMP: "tmp"
  S3_BUCKET_PROD: "prod"
  
  # Discord OAuth
  # Note: DISCORD_CLIENT_ID and DISCORD_CLIENT_SECRET are stored in Secret
  DISCORD_GUILD_ID: ""
  
  # External Validation Services
  # Note: All credentials are stored in Secret for security
  
  # Web runtime configuration (injected into /env-config.js by Docker entrypoint)
  # Must be reachable from the end user's browser, not a cluster-internal Service DNS name.
  VITE_API_URL: "https://api.example.com"
  VITE_FORM_SECURITY_DEV_BYPASS: "false"
  VITE_HCAPTCHA_SITE_KEY: ""

  # Public API origin used by server-side Google OAuth callback pages
  NEXT_PUBLIC_BASE_URL: ""
  
  # Optional Settings
  SENTRY_DSN: ""
  LOG_LEVEL: "info"
  ENABLE_FINGERPRINT_COLLECTION: "false"
  DATA_RETENTION_DAYS: "90"
  EXTERNAL_SERVICE_CACHE_TTL: "3600"
  MAX_FILE_SIZE_MB: "10"
  ALLOWED_IMAGE_TYPES: "image/jpeg,image/png,image/webp"
  DEFAULT_TIMEZONE: "Asia/Tokyo"
