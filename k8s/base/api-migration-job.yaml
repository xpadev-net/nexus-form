apiVersion: batch/v1
kind: Job
metadata:
  name: api-migration
  labels:
    app: nexus-form
    component: api-migration
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: nexus-form
        component: api-migration
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: nexus-form:latest
        imagePullPolicy: Always
        command:
        - /nodejs/bin/node
        - /migration/run-migrations.mjs
        envFrom:
        - configMapRef:
            name: nexus-form-config
        - secretRef:
            name: nexus-form-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
