apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: nexus-form
    component: web
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: nexus-form
      component: web
  template:
    metadata:
      labels:
        app: nexus-form
        component: web
    spec:
      containers:
      - name: web
        image: nexus-form-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_API_URL
        - name: VITE_HCAPTCHA_SITE_KEY
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_HCAPTCHA_SITE_KEY
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
