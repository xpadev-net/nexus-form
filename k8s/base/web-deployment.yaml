apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: nexus-form
    component: web
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: nexus-form
      component: web
  template:
    metadata:
      labels:
        app: nexus-form
        component: web
    spec:
      containers:
      - name: web
        image: nexus-form-web:latest
        imagePullPolicy: Always
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_API_URL
        - name: VITE_HCAPTCHA_SITE_KEY
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_HCAPTCHA_SITE_KEY
        - name: VITE_BRAND_APP_NAME
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_APP_NAME
              optional: true
        - name: VITE_BRAND_PRIMARY_COLOR
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_PRIMARY_COLOR
              optional: true
        - name: VITE_BRAND_SECONDARY_COLOR
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_SECONDARY_COLOR
              optional: true
        - name: VITE_BRAND_ACCENT_COLOR
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_ACCENT_COLOR
              optional: true
        - name: VITE_BRAND_TERMS_URL
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_TERMS_URL
              optional: true
        - name: VITE_BRAND_PRIVACY_URL
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_PRIVACY_URL
              optional: true
        - name: VITE_BRAND_COPYRIGHT
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_COPYRIGHT
              optional: true
        - name: VITE_BRAND_HOMEPAGE_URL
          valueFrom:
            configMapKeyRef:
              name: nexus-form-config
              key: VITE_BRAND_HOMEPAGE_URL
              optional: true
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
