apiVersion: apps/v1
kind: Deployment
metadata:
  name: bullmq-validation-github
  labels:
    app: nexus-form
    component: bullmq-validation-github
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: nexus-form
      component: bullmq-validation-github
  template:
    metadata:
      labels:
        app: nexus-form
        component: bullmq-validation-github
    spec:
      containers:
      - name: github-validation-worker
        # Use worker-specific image built from Dockerfile.worker.
        # dist/index.mjs selects this queue via WORKER_QUEUES.
        image: nexus-form-worker:latest
        imagePullPolicy: Always
        env:
        - name: WORKER_QUEUES
          value: "github-validation"
        envFrom:
        - configMapRef:
            name: nexus-form-config
        - secretRef:
            name: nexus-form-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command:
              - "/nodejs/bin/node"
              - "-e"
              - >
                const fs=require('fs');const hp=process.env.WORKER_HEALTH_FILE||'/tmp/nexus-form-worker-health.json';const rawMaxAge=Number(process.env.WORKER_HEALTH_MAX_AGE_MS||'15000');const maxAge=Number.isFinite(rawMaxAge)&&rawMaxAge>0?rawMaxAge:15000;try{const data=JSON.parse(fs.readFileSync(hp,'utf8'));if(typeof data.lastBeat!=='number'||!Number.isFinite(data.lastBeat)){process.exit(1)}if(Date.now()-data.lastBeat>maxAge){process.exit(1)}process.exit(0)}catch(_){process.exit(1)}
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - "/nodejs/bin/node"
              - "-e"
              - >
                const fs=require('fs');const hp=process.env.WORKER_HEALTH_FILE||'/tmp/nexus-form-worker-health.json';const rawMaxAge=Number(process.env.WORKER_HEALTH_MAX_AGE_MS||'15000');const maxAge=Number.isFinite(rawMaxAge)&&rawMaxAge>0?rawMaxAge:15000;try{const data=JSON.parse(fs.readFileSync(hp,'utf8'));if(!data||data.ready!==true){process.exit(1)}if(typeof data.lastBeat!=='number'||!Number.isFinite(data.lastBeat)){process.exit(1)}if(Date.now()-data.lastBeat>maxAge){process.exit(1)}process.exit(0)}catch(_){process.exit(1)}
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
