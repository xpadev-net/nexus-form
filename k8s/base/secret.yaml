apiVersion: v1
kind: Secret
metadata:
  name: nexus-form-secrets
  labels:
    app: nexus-form
type: Opaque
stringData:
  # Authentication Secrets
  AUTH_SECRET: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"
  CSRF_SECRET: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"
  SESSION_ALIAS_SALT: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"
  SESSION_IP_SALT: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"
  GOOGLE_OAUTH_ENC_KEY: "CHANGE_ME_GENERATE_WITH_openssl_rand_base64_32"
  SIGNUP_INVITATION_CODE: "CHANGE_ME"
  
  # hCaptcha Secret Key (required for hCaptcha verification)
  HCAPTCHA_SECRET_KEY: "CHANGE_ME"
  
  # Discord Bot Token
  DISCORD_BOT_TOKEN: "CHANGE_ME"
  
  # GitHub Private Key
  GITHUB_PRIVATE_KEY: "CHANGE_ME"
  GITHUB_APP_ID: "CHANGE_ME"
  GITHUB_INSTALLATION_ID: ""
  
  # Discord OAuth (moved from ConfigMap for security)
  DISCORD_CLIENT_ID: "CHANGE_ME"
  DISCORD_CLIENT_SECRET: "CHANGE_ME"
  
  # S3 Credentials (moved from ConfigMap for security)
  S3_ACCESS_KEY_ID: "CHANGE_ME"
  S3_SECRET_ACCESS_KEY: "CHANGE_ME"
  
  # Twitter API Credentials (moved from ConfigMap for security)
  TWITTER_BEARER_TOKEN: "CHANGE_ME"
  TWITTER_API_KEY: "CHANGE_ME"
  TWITTER_API_SECRET: "CHANGE_ME"
  TWITTER_ACCESS_TOKEN: "CHANGE_ME"
  TWITTER_ACCESS_TOKEN_SECRET: "CHANGE_ME"
  
  # Redis Password (if required)
  REDIS_PASSWORD: ""
  
  # Database Connection String (moved from ConfigMap for security)
  # Note: DATABASE_URL should contain the full connection string including password
  DATABASE_URL: "mysql://user:CHANGE_ME_PASSWORD@mysql-service:3306/nexus_form"
