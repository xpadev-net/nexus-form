# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "{src,apps,packages}/**/*.{js,jsx,ts,tsx,json,css,md}"
      exclude: "{src,apps/**/src}/components/ui/*"
      run: |
        filtered=""
        for f in {staged_files}; do
          case "$f" in
            */src/components/ui/*) ;;
            *) filtered="$filtered $f" ;;
          esac
        done
        if [ -n "$filtered" ]; then
          # shellcheck disable=SC2086
          pnpm biome check $filtered --write --unsafe
        fi
      stage_fixed: true
    forbid-colors:
      glob: "{src,apps,packages}/**/*.{ts,tsx,js,jsx,css,md,mdx}"
      run: pnpm ci:forbid-colors {staged_files}
    type-check:
      glob: "{src,apps,packages}/**/*.{ts,tsx}"
      run: pnpm type-check

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint
    type-check:
      run: pnpm type-check
    test:
      run: pnpm test
