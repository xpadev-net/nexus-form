# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "{src,apps,packages}/**/*.{js,jsx,ts,tsx,json,css,md}"
      exclude: "{src,apps/**/src}/components/ui/**"
      run: |
        bash -c '
          if [ "$#" -gt 0 ]; then
            pnpm biome check "$@" --write --unsafe
          fi
        ' -- {staged_files}
      stage_fixed: true
    forbid-colors:
      glob: "{src,apps,packages}/**/*.{ts,tsx,js,jsx,css,md,mdx}"
      run: pnpm ci:forbid-colors {staged_files}
    db-schema-staged-check:
      glob: "packages/database/src/{schema,auth-schema}.ts"
      run: pnpm db:schema:check-staged

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint
    type-check:
      run: pnpm type-check
    test:
      run: pnpm test
